name: 🔍 Feature Branch Checks

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - "feature/**"
    types: [opened, synchronize, reopened]
  workflow_dispatch:    # manual trigger from GitHub UI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true  # always true for feature branches, safe

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Secret Scanning (Gate)
  # All other jobs depend on this passing first
  # ─────────────────────────────────────────────
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main  # TruffleHog only publishes @main — no versioned tags available
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ─────────────────────────────────────────────
  # JOB 2 — Backend Checks
  # Runs only if secret-scan passes
  # ─────────────────────────────────────────────
  backend-checks:
    name: 🐍 Backend Checks
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pip-audit pytest
          pip install -r requirements.txt

      - name: Lint with Flake8
        run: |
          flake8 app/ tests/ --max-line-length=88

      - name: Dependency vulnerability scan with pip-audit
        run: |
          pip-audit -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          FIREBASE_CREDENTIALS_JSON: "{}"
          FIREBASE_PROJECT_ID: test-project
          GROQ_API_KEY: test-key
          MODEL_DIR: /tmp/models

  # ─────────────────────────────────────────────
  # JOB 3 — Frontend Checks
  # Runs only if secret-scan passes
  # Runs in parallel with backend-checks
  # ─────────────────────────────────────────────
  frontend-checks:
    name: 🦋 Frontend Checks
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "stable"
          channel: "stable"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze — static analysis
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Check outdated packages
        run: flutter pub outdated
        continue-on-error: true

      - name: Install OSV Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: OSV Scanner — dependency vulnerability scan
        run: |
          osv-scanner --lockfile=pubspec.lock

  # ─────────────────────────────────────────────
  # JOB 4 — Final Gate
  # Only passes if ALL jobs above passed
  # ─────────────────────────────────────────────
  all-checks-passed:
    name: ✅ All Checks Passed
    runs-on: ubuntu-latest
    needs: [secret-scan, backend-checks, frontend-checks]
    if: always()

    steps:
      - name: Verify all jobs passed
        run: |
          echo "secret-scan:      ${{ needs.secret-scan.result }}"
          echo "backend-checks:   ${{ needs.backend-checks.result }}"
          echo "frontend-checks:  ${{ needs.frontend-checks.result }}"

          if [[ "${{ needs.secret-scan.result }}"     != "success" || \
                "${{ needs.backend-checks.result }}"  != "success" || \
                "${{ needs.frontend-checks.result }}" != "success" ]]; then
            echo "❌ One or more checks failed."
            exit 1
          fi

          echo "✅ All checks passed."
