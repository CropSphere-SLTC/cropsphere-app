version: "3.8"

services:
  backend:
    build: .
    # Add the environment variable telling the Google library where to look
    environment:
      - FIREBASE_CREDENTIALS_JSON=/backend/firebase-credentials.json
      - GOOGLE_APPLICATION_CREDENTIALS=/backend/firebase-credentials.json 
    # Mount the file from your local machine into the container
      
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app                    # hot reload
      - ./models/files:/app/models/files  # ML model files
      - ./tests:/app/tests                # test files
      - ./firebase-credentials.json:/backend/firebase-credentials.json
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
